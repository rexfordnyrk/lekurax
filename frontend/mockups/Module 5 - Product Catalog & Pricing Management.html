<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog & Pricing Management - Lekurax Pharmacy System</title>
    <link rel="stylesheet" href="colors_and_type.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css">
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--neutral-50);
            color: var(--neutral-600);
            font-size: 14px;
            line-height: 1.5;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-600);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 28px;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
        }

        .nav-section {
            margin-bottom: 24px;
        }

        .nav-section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--neutral-400);
            padding: 0 12px 8px;
            letter-spacing: 0.5px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--neutral-600);
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 2px;
        }

        .nav-item:hover {
            background: var(--neutral-100);
            color: var(--neutral-900);
        }

        .nav-item.active {
            background: var(--primary-50);
            color: var(--primary-600);
            font-weight: 500;
        }

        .nav-item i {
            font-size: 18px;
        }

        .main-content {
            flex: 1;
            margin-left: 260px;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            background: white;
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .page-title-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--neutral-900);
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--neutral-500);
        }

        .breadcrumb a {
            color: var(--neutral-500);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            color: var(--primary-600);
        }

        .top-bar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary-600);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-700);
        }

        .btn-secondary {
            background: white;
            color: var(--neutral-700);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--neutral-50);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }

        .content-area {
            padding: 24px;
            flex: 1;
        }

        .card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--neutral-900);
        }

        .card-body {
            padding: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .stat-icon.primary {
            background: var(--primary-100);
            color: var(--primary-600);
        }

        .stat-icon.success {
            background: var(--success-100);
            color: var(--success-600);
        }

        .stat-icon.warning {
            background: var(--warning-100);
            color: var(--warning-600);
        }

        .stat-icon.info {
            background: var(--info-100);
            color: var(--info-600);
        }

        .stat-content {
            flex: 1;
            min-width: 0;
        }

        .stat-label {
            font-size: 12px;
            color: var(--neutral-500);
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--neutral-900);
            line-height: 1.2;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--neutral-50);
        }

        th {
            text-align: left;
            padding: 10px 14px;
            font-size: 11px;
            font-weight: 600;
            color: var(--neutral-700);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border-color);
            color: var(--neutral-700);
            font-size: 13px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background: var(--neutral-50);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 9px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-success {
            background: var(--success-100);
            color: var(--success-700);
        }

        .badge-warning {
            background: var(--warning-100);
            color: var(--warning-700);
        }

        .badge-danger {
            background: var(--danger-100);
            color: var(--danger-700);
        }

        .badge-info {
            background: var(--info-100);
            color: var(--info-700);
        }

        .badge-neutral {
            background: var(--neutral-100);
            color: var(--neutral-700);
        }

        .action-btn {
            padding: 6px;
            background: none;
            border: none;
            color: var(--neutral-500);
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--neutral-100);
            color: var(--neutral-700);
        }

        .filters-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
            padding: 14px 16px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .search-input {
            flex: 1;
            max-width: 350px;
            position: relative;
        }

        .search-input input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .search-input input:focus {
            border-color: var(--primary-600);
        }

        .search-input i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neutral-400);
        }

        .filter-select {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 13px;
            color: var(--neutral-700);
            outline: none;
            background: white;
            cursor: pointer;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal.modal-large {
            max-width: calc(100vw - 280px);
            margin-left: 260px;
            margin-right: 20px;
        }

        .modal-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--neutral-900);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--neutral-400);
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        .modal-close:hover {
            background: var(--neutral-100);
            color: var(--neutral-700);
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
        }

        .modal-footer {
            padding: 14px 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .form-grid.single {
            grid-template-columns: 1fr;
        }

        .form-grid.triple {
            grid-template-columns: repeat(3, 1fr);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--neutral-700);
        }

        .form-label.required::after {
            content: '*';
            color: var(--danger-600);
            margin-left: 4px;
        }

        .form-input {
            padding: 9px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .form-input:focus {
            border-color: var(--primary-600);
        }

        .two-column-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 12px;
            row-gap: 10px;
        }

        .info-label {
            font-size: 13px;
            color: var(--neutral-500);
            font-weight: 500;
        }

        .info-value {
            font-size: 13px;
            color: var(--neutral-900);
        }

        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
            background: white;
            padding: 0 20px;
        }

        .tab {
            padding: 12px 16px;
            color: var(--neutral-600);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            font-weight: 500;
            font-size: 13px;
            transition: all 0.2s;
        }

        .tab:hover {
            color: var(--neutral-900);
        }

        .tab.active {
            color: var(--primary-600);
            border-bottom-color: var(--primary-600);
        }

        .price-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: var(--success-50);
            border: 1px solid var(--success-200);
            border-radius: 6px;
            font-weight: 600;
            color: var(--success-700);
        }

        .section-header {
            font-size: 14px;
            font-weight: 600;
            color: var(--neutral-900);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const mockProducts = [
            {
                id: 1,
                name: 'Amoxicillin 500mg Capsules',
                genericName: 'Amoxicillin',
                category: 'Antibiotic',
                sku: 'MED-AMX-500',
                basePrice: 12.50,
                retailPrice: 15.00,
                margin: 20,
                stock: 450,
                status: 'Active'
            },
            {
                id: 2,
                name: 'Lisinopril 10mg Tablets',
                genericName: 'Lisinopril',
                category: 'Cardiovascular',
                sku: 'MED-LIS-010',
                basePrice: 8.75,
                retailPrice: 11.00,
                margin: 25.7,
                stock: 320,
                status: 'Active'
            },
            {
                id: 3,
                name: 'Metformin 850mg Tablets',
                genericName: 'Metformin HCl',
                category: 'Diabetes',
                sku: 'MED-MET-850',
                basePrice: 15.20,
                retailPrice: 19.50,
                margin: 28.3,
                stock: 180,
                status: 'Active'
            }
        ];

        const mockPriceLists = [
            {
                id: 1,
                name: 'Retail Price List',
                type: 'Retail',
                effectiveDate: '2024-01-01',
                products: 1245,
                status: 'Active'
            },
            {
                id: 2,
                name: 'Institutional Pricing',
                type: 'Institutional',
                effectiveDate: '2024-01-01',
                products: 890,
                status: 'Active'
            },
            {
                id: 3,
                name: 'Insurance Contract - HealthCo',
                type: 'Insurance',
                effectiveDate: '2024-01-01',
                products: 1100,
                status: 'Active'
            }
        ];

        const mockPromotions = [
            {
                id: 1,
                name: 'Summer Wellness Sale',
                type: 'Percentage Discount',
                value: '15%',
                startDate: '2024-06-01',
                endDate: '2024-08-31',
                products: 45,
                status: 'Scheduled'
            },
            {
                id: 2,
                name: 'Buy 2 Get 1 Free - Vitamins',
                type: 'BOGO',
                value: 'B2G1',
                startDate: '2024-04-01',
                endDate: '2024-05-31',
                products: 12,
                status: 'Active'
            }
        ];

        function ProductCatalogApp() {
            const [activeTab, setActiveTab] = useState('products');
            const [showModal, setShowModal] = useState(false);
            const [modalType, setModalType] = useState('');
            const [selectedItem, setSelectedItem] = useState(null);

            const openModal = (type, item = null) => {
                setModalType(type);
                setSelectedItem(item);
                setShowModal(true);
            };

            const closeModal = () => {
                setShowModal(false);
                setSelectedItem(null);
            };

            return (
                <div className="admin-layout">
                    <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} />
                    <div className="main-content">
                        <TopBar activeTab={activeTab} openModal={openModal} />
                        <div className="content-area">
                            {activeTab === 'products' && (
                                <ProductsTab products={mockProducts} openModal={openModal} />
                            )}
                            {activeTab === 'pricing' && (
                                <PricingTab products={mockProducts} openModal={openModal} />
                            )}
                            {activeTab === 'pricelists' && (
                                <PriceListsTab priceLists={mockPriceLists} openModal={openModal} />
                            )}
                            {activeTab === 'promotions' && (
                                <PromotionsTab promotions={mockPromotions} openModal={openModal} />
                            )}
                            {activeTab === 'tax' && (
                                <TaxConfigTab openModal={openModal} />
                            )}
                        </div>
                    </div>
                    {showModal && (
                        <Modal type={modalType} item={selectedItem} onClose={closeModal} />
                    )}
                </div>
            );
        }

        function Sidebar({ activeTab, setActiveTab }) {
            return (
                <div className="sidebar">
                    <div className="sidebar-header">
                        <div className="logo">
                            <i className="ri-capsule-fill"></i>
                            <span>Lekurax</span>
                        </div>
                    </div>
                    <div className="sidebar-nav">
                        <div className="nav-section">
                            <div className="nav-section-title">Catalog</div>
                            <div className={`nav-item ${activeTab === 'products' ? 'active' : ''}`}
                                 onClick={() => setActiveTab('products')}>
                                <i className="ri-medicine-bottle-line"></i>
                                <span>Products</span>
                            </div>
                            <div className={`nav-item ${activeTab === 'categories' ? 'active' : ''}`}
                                 onClick={() => setActiveTab('categories')}>
                                <i className="ri-folder-line"></i>
                                <span>Categories</span>
                            </div>
                        </div>
                        <div className="nav-section">
                            <div className="nav-section-title">Pricing</div>
                            <div className={`nav-item ${activeTab === 'pricing' ? 'active' : ''}`}
                                 onClick={() => setActiveTab('pricing')}>
                                <i className="ri-price-tag-3-line"></i>
                                <span>Pricing Strategies</span>
                            </div>
                            <div className={`nav-item ${activeTab === 'pricelists' ? 'active' : ''}`}
                                 onClick={() => setActiveTab('pricelists')}>
                                <i className="ri-file-list-3-line"></i>
                                <span>Price Lists</span>
                            </div>
                            <div className={`nav-item ${activeTab === 'promotions' ? 'active' : ''}`}
                                 onClick={() => setActiveTab('promotions')}>
                                <i className="ri-percent-line"></i>
                                <span>Promotions & Discounts</span>
                            </div>
                            <div className={`nav-item ${activeTab === 'tax' ? 'active' : ''}`}
                                 onClick={() => setActiveTab('tax')}>
                                <i className="ri-calculator-line"></i>
                                <span>Tax Configuration</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function TopBar({ activeTab, openModal }) {
            const getActionButton = () => {
                switch(activeTab) {
                    case 'products':
                        return <button className="btn btn-primary" onClick={() => openModal('addProduct')}>
                            <i className="ri-add-line"></i>Add Product
                        </button>;
                    case 'pricelists':
                        return <button className="btn btn-primary" onClick={() => openModal('createPriceList')}>
                            <i className="ri-add-line"></i>Create Price List
                        </button>;
                    case 'promotions':
                        return <button className="btn btn-primary" onClick={() => openModal('createPromotion')}>
                            <i className="ri-add-line"></i>New Promotion
                        </button>;
                    default:
                        return null;
                }
            };

            return (
                <div className="top-bar">
                    <div className="page-title-section">
                        <div>
                            <div className="breadcrumb">
                                <a href="#">Operations</a>
                                <i className="ri-arrow-right-s-line"></i>
                                <span>Product Catalog & Pricing</span>
                            </div>
                            <h1 className="page-title">Product Catalog & Pricing Management</h1>
                        </div>
                    </div>
                    <div className="top-bar-actions">
                        {getActionButton()}
                    </div>
                </div>
            );
        }

        function ProductsTab({ products, openModal }) {
            return (
                <>
                    <div className="stats-grid">
                        <div className="stat-card">
                            <div className="stat-icon primary">
                                <i className="ri-medicine-bottle-line"></i>
                            </div>
                            <div className="stat-content">
                                <div className="stat-label">Total Products</div>
                                <div className="stat-value">1,245</div>
                            </div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-icon success">
                                <i className="ri-check-line"></i>
                            </div>
                            <div className="stat-content">
                                <div className="stat-label">Active Products</div>
                                <div className="stat-value">1,189</div>
                            </div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-icon warning">
                                <i className="ri-alert-line"></i>
                            </div>
                            <div className="stat-content">
                                <div className="stat-label">Low Stock Items</div>
                                <div className="stat-value">23</div>
                            </div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-icon info">
                                <i className="ri-line-chart-line"></i>
                            </div>
                            <div className="stat-content">
                                <div className="stat-label">Avg Margin</div>
                                <div className="stat-value">24.5%</div>
                            </div>
                        </div>
                    </div>

                    <div className="filters-bar">
                        <div className="search-input">
                            <i className="ri-search-line"></i>
                            <input type="text" placeholder="Search by name, SKU, or generic name..." />
                        </div>
                        <select className="filter-select">
                            <option>All Categories</option>
                            <option>Antibiotic</option>
                            <option>Cardiovascular</option>
                            <option>Diabetes</option>
                            <option>Pain Relief</option>
                        </select>
                        <select className="filter-select">
                            <option>All Status</option>
                            <option>Active</option>
                            <option>Inactive</option>
                        </select>
                    </div>

                    <div className="card">
                        <div className="card-header">
                            <h3 className="card-title">Product Catalog</h3>
                            <button className="btn btn-secondary btn-sm">
                                <i className="ri-download-line"></i>Export
                            </button>

                            {activeModalTab === 'inventory' && (
                                <div>
                                    <div style={{textAlign: 'center', padding: '40px 20px', color: 'var(--neutral-500)'}}>
                                        Inventory details would display here
                                    </div>
                                </div>
                            )}
                        </div>
                        <div className="modal-footer">
                            <button className="btn btn-secondary" onClick={onClose}>Close</button>
                            <button className="btn btn-primary">
                                <i className="ri-edit-line"></i>Edit Product
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function CreatePriceListModal({ onClose }) {
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2 className="modal-title">Create Price List</h2>
                            <button className="modal-close" onClick={onClose}>
                                <i className="ri-close-line"></i>
                            </button>
                        </div>
                        <div className="modal-body">
                            <div className="form-grid">
                                <div className="form-group">
                                    <label className="form-label required">Price List Name</label>
                                    <input type="text" className="form-input" />
                                </div>
                                <div className="form-group">
                                    <label className="form-label required">Type</label>
                                    <select className="form-input">
                                        <option>Retail</option>
                                        <option>Institutional</option>
                                        <option>Insurance</option>
                                        <option>Government</option>
                                    </select>
                                </div>
                            </div>
                            <div className="form-grid" style={{marginTop: '16px'}}>
                                <div className="form-group">
                                    <label className="form-label required">Effective Date</label>
                                    <input type="date" className="form-input" />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Based On</label>
                                    <select className="form-input">
                                        <option>New Price List</option>
                                        <option>Copy from Retail Price List</option>
                                        <option>Copy from Institutional Pricing</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div className="modal-footer">
                            <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
                            <button className="btn btn-primary">Create Price List</button>
                        </div>
                    </div>
                </div>
            );
        }

        function ViewPriceListModal({ priceList, onClose }) {
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal modal-large" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2 className="modal-title">{priceList.name}</h2>
                            <button className="modal-close" onClick={onClose}>
                                <i className="ri-close-line"></i>
                            </button>
                        </div>
                        <div className="modal-body">
                            <div className="info-grid" style={{marginBottom: '24px'}}>
                                <div className="info-label">Type</div>
                                <div className="info-value">{priceList.type}</div>
                                
                                <div className="info-label">Effective Date</div>
                                <div className="info-value">{priceList.effectiveDate}</div>
                                
                                <div className="info-label">Products</div>
                                <div className="info-value">{priceList.products.toLocaleString()}</div>
                                
                                <div className="info-label">Status</div>
                                <div className="info-value">
                                    <span className="badge badge-success">{priceList.status}</span>
                                </div>
                            </div>
                            <div style={{textAlign: 'center', padding: '40px 20px', color: 'var(--neutral-500)'}}>
                                Price list details and product prices would display here
                            </div>
                        </div>
                        <div className="modal-footer">
                            <button className="btn btn-secondary" onClick={onClose}>Close</button>
                            <button className="btn btn-primary">
                                <i className="ri-edit-line"></i>Edit Price List
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function CreatePromotionModal({ onClose }) {
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2 className="modal-title">Create Promotion</h2>
                            <button className="modal-close" onClick={onClose}>
                                <i className="ri-close-line"></i>
                            </button>
                        </div>
                        <div className="modal-body">
                            <div className="form-grid single">
                                <div className="form-group">
                                    <label className="form-label required">Promotion Name</label>
                                    <input type="text" className="form-input" />
                                </div>
                            </div>
                            <div className="form-grid" style={{marginTop: '16px'}}>
                                <div className="form-group">
                                    <label className="form-label required">Type</label>
                                    <select className="form-input">
                                        <option>Percentage Discount</option>
                                        <option>Fixed Amount Discount</option>
                                        <option>Buy One Get One</option>
                                        <option>Bundle Deal</option>
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label className="form-label required">Discount Value</label>
                                    <input type="text" className="form-input" placeholder="e.g., 15 or 15%" />
                                </div>
                            </div>
                            <div className="form-grid" style={{marginTop: '16px'}}>
                                <div className="form-group">
                                    <label className="form-label required">Start Date</label>
                                    <input type="date" className="form-input" />
                                </div>
                                <div className="form-group">
                                    <label className="form-label required">End Date</label>
                                    <input type="date" className="form-input" />
                                </div>
                            </div>
                        </div>
                        <div className="modal-footer">
                            <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
                            <button className="btn btn-primary">Create Promotion</button>
                        </div>
                    </div>
                </div>
            );
        }

        function ViewPromotionModal({ promotion, onClose }) {
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal modal-large" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2 className="modal-title">{promotion.name}</h2>
                            <button className="modal-close" onClick={onClose}>
                                <i className="ri-close-line"></i>
                            </button>
                        </div>
                        <div className="modal-body">
                            <div className="two-column-grid">
                                <div className="info-grid">
                                    <div className="info-label">Type</div>
                                    <div className="info-value">{promotion.type}</div>
                                    
                                    <div className="info-label">Discount Value</div>
                                    <div className="info-value"><strong>{promotion.value}</strong></div>
                                    
                                    <div className="info-label">Start Date</div>
                                    <div className="info-value">{promotion.startDate}</div>
                                    
                                    <div className="info-label">End Date</div>
                                    <div className="info-value">{promotion.endDate}</div>
                                </div>
                                <div className="info-grid">
                                    <div className="info-label">Products</div>
                                    <div className="info-value">{promotion.products}</div>
                                    
                                    <div className="info-label">Status</div>
                                    <div className="info-value">
                                        <span className={`badge badge-${promotion.status === 'Active' ? 'success' : 'info'}`}>
                                            {promotion.status}
                                        </span>
                                    </div>
                                    
                                    <div className="info-label">Times Used</div>
                                    <div className="info-value">0</div>
                                    
                                    <div className="info-label">Total Discount</div>
                                    <div className="info-value">$0.00</div>
                                </div>
                            </div>
                        </div>
                        <div className="modal-footer">
                            <button className="btn btn-secondary" onClick={onClose}>Close</button>
                            <button className="btn btn-primary">
                                <i className="ri-edit-line"></i>Edit Promotion
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ProductCatalogApp />);
    </script>
</body>
</html>
